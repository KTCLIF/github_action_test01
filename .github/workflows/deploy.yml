name: "Terraform & Ansible CI/CD"

on:
  push:
    branches: ["master"] # master 브랜치에 push가 될 때마다 실행하겠다는 의미

jobs:
  deploy:
    runs-on: ubuntu-latest # 최신 ubuntu machine 을 잠시 빌려서 아래의 작업을 수행하겠다는 의미
    # ubuntu machine 의 환경 변수에 넣어줄 값을 세팅하는 설정
    # 우리가 mgmt 서버에 aws configure를 실행해서 키를 등록했듯이 1회용 ubuntu 서버에도 동일한 작업을 해준다.
    # job 안의 모든 step에서 등록된 aws 키를 공통으로 사용하게 된다.

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} # 이게 동작하기 위해서는 github에 secrets가 등록이 되어 있어야 한다.
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
    steps:
      # 1. 소스코드 체크아웃 (대상 github 저장소를 clone 하고 해당 폴더 안으로 들어가는 작업을 대신해준다.)
      - uses: actions/checkout@v5

      # 2. terraform 환경 구성
      - name: setup Terraform
        uses: hashicorp/setup-terraform@v4

      # 3. init & apply 실행
      - name: terraform init & apply
        run: |
          terraform init
          terraform apply --auto-approve

      # 4. ansible 용 key setting
      - name: setup ssh key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 5. ansible playbook 실행
      - name: run ansible playbook
        run: |
          # terraform이 이미 inventory.yml 과 ansible.cfg를 현재 디렉토리에 만들어 놓았습니다.
          ansible-playbook nginx_setup.yml



